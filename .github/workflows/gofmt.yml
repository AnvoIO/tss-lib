name: Go fmt

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gofmt:
    name: Go fmt check
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          unformatted=$(find . -name '*.go' ! -name '*.pb.go' -exec gofmt -l {} +)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi
