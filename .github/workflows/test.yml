name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: 'Test: ${{ matrix.cfg.name }}'
    strategy:
      fail-fast: false
      matrix:
        include:
          - cfg: {name: 'Ubuntu 22.04 x86_64', runson: 'ubuntu-22.04'}
          - cfg: {name: 'Ubuntu 24.04 x86_64', runson: 'ubuntu-24.04'}
          - cfg: {name: 'Ubuntu 22.04 ARM64',  runson: 'ubuntu-24.04-arm', container: 'ubuntu:jammy'}
          - cfg: {name: 'Ubuntu 24.04 ARM64',  runson: 'ubuntu-24.04-arm', container: 'ubuntu:noble'}
          - cfg: {name: 'macOS (Apple Silicon)', runson: 'macos-latest'}
    runs-on: ${{ matrix.cfg.runson }}
    container: ${{ matrix.cfg.container || '' }}
    steps:
      - name: Install packages (container)
        if: matrix.cfg.container
        run: |
          apt-get update && apt-get -y install build-essential git curl
          curl -fsSL https://go.dev/dl/go1.23.6.linux-arm64.tar.gz | tar -C /usr/local -xzf -
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Set up Go
        if: '!matrix.cfg.container'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/checkout@v4

      - name: Build
        run: go build ./...

      - name: Test (with race detection)
        run: make test_unit_race

  test-signing-race:
    name: 'Signing race regression'
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/checkout@v4

      - name: Run signing race regression tests
        run: make test_signing_race
